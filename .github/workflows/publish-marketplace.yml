name: Publish Marketplace to Public Repo

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'plugin/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "me@oweninnes.com"
          git config user.name "Owen Innes"

      - name: Sync source to publishable artifacts
        run: |
          # Only sync plugin/ source into plugins/claudetools/ — other plugins
          # (prompt-improver, sequential-thinking) have their own source and must
          # NOT be overwritten with claudetools content.
          plugin_dir="plugins/claudetools"

          # Preserve the published plugin.json (auto-version manages it)
          published_json="$plugin_dir/.claude-plugin/plugin.json"
          preserved_version=""
          if [ -f "$published_json" ]; then
            preserved_version=$(jq -r '.version' "$published_json" 2>/dev/null || true)
          fi

          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='logs/' \
            plugin/ "$plugin_dir/"

          # Restore the published version (source has stale version)
          if [ -n "$preserved_version" ] && [ -f "$published_json" ]; then
            tmp=$(mktemp)
            jq --arg v "$preserved_version" '.version = $v' "$published_json" > "$tmp" && mv "$tmp" "$published_json"
          fi

          # Stage sync changes so auto-version sees them
          git add plugins/ || true

      - name: Auto-bump plugin versions
        run: bash .github/scripts/auto-version.sh

      - name: Push version bumps to dev repo
        run: git push origin main 2>/dev/null || true

      - name: Prepare public directory
        run: |
          mkdir -p ${{ github.workspace }}/public-out/.claude-plugin
          cp .claude-plugin/marketplace.json ${{ github.workspace }}/public-out/.claude-plugin/
          cp -r plugins ${{ github.workspace }}/public-out/plugins 2>/dev/null || true
          cp README.md ${{ github.workspace }}/public-out/ 2>/dev/null || true
          cp -r docs ${{ github.workspace }}/public-out/docs 2>/dev/null || true
          cp -r .github ${{ github.workspace }}/public-out/.github 2>/dev/null || true

      - name: Push to public marketplace
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PUBLIC_REPO_TOKEN }}
        with:
          source-directory: 'public-out'
          destination-github-username: 'claudetools'
          destination-repository-name: 'marketplace'
          target-branch: 'main'
          user-email: 'me@oweninnes.com'
          user-name: 'Owen Innes'
          commit-message: 'sync: update marketplace from dev'

      - name: Trigger docs deploy on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          gh workflow run "Deploy Docs" --repo ClaudeTools/marketplace --ref main 2>/dev/null || true
