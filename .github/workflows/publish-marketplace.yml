name: Publish Marketplace to Public Repo

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4

      - name: Push to public marketplace
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PUBLIC_REPO_TOKEN }}
        with:
          source-directory: '.'
          destination-github-username: 'claudetools'
          destination-repository-name: 'marketplace'
          target-branch: 'main'
          user-email: 'me@oweninnes.com'
          user-name: 'Owen Innes'
          commit-message: 'sync: update marketplace from dev repo'
