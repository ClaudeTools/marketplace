title: claudetools
description: >-
  Zero-config guardrails, skills, and agent pipelines for Claude Code.

url: "https://claudetools.github.io"
baseurl: "/marketplace"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: claudetools

logo: "/marketplace/assets/images/logo-light.png"

search_enabled: true
search:
  heading_level: 3
  previews: 3

heading_anchors: true
permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/ClaudeTools/marketplace"
aux_links_new_tab: true

footer_content: >-
  claudetools is open source under the MIT license.

back_to_top: true
back_to_top_text: "Back to top"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ClaudeTools/marketplace"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

callouts_level: quiet
callouts:
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: red

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
