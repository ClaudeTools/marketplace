<meta name="theme-color" content="#0a0a0a">

<!-- Prevent FOUC: dark bg immediately -->
<style>
  body { background-color: #0a0a0a; color: #ededed; }
  .side-bar { background-color: #0a0a0a; }
</style>

<!-- Custom CSS — loaded after Just the Docs to override -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/custom.css">

<!-- Copy button styles (inline to avoid FOUC) -->
<style>
  .ct-copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 10px;
    font-size: 0.7rem;
    font-family: -apple-system, sans-serif;
    background: #1f1f1f;
    color: #888;
    border: 1px solid #333;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  pre:hover .ct-copy-btn { opacity: 1; }
  .ct-copy-btn:hover { color: #ededed; border-color: #555; }
  .ct-copy-btn.ct-copied { color: #7BCC2E; border-color: #7BCC2E; }

  /* Mobile nav toggle animation */
  .ct-nav-open { transform: translateX(0) !important; }

  /* TOC active tracking */
  .ct-toc-active { color: #7BCC2E !important; font-weight: 600; }

  /* Search hint */
  .search-input::placeholder { font-size: 0.8rem; }
</style>

<!-- Custom JS — deferred -->
<script src="{{ site.baseurl }}/assets/js/custom.js" defer></script>
