<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Brandmark: green square with terminal icon -->
  <rect x="4" y="4" width="72" height="72" rx="14" fill="#7BCC2E"/>
  <!-- Terminal > -->
  <path d="M24 28 L40 42 L24 56" stroke="#2B2B2B" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Terminal _ -->
  <line x1="42" y1="56" x2="56" y2="56" stroke="#2B2B2B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Text: inline style, no external fonts -->
  <text x="92" y="55" font-family="ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,Liberation Mono,monospace" font-weight="700" font-size="34" fill="#1a1a1a" letter-spacing="-0.5">claudetools</text>
</svg>
